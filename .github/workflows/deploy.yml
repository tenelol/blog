name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - blog-deploy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.155.3"
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Deploy locally on the server
        run: |
          mkdir -p /var/www/hmp/current
          rsync -av --delete public/ /var/www/hmp/current/
